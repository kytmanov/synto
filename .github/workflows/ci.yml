name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    name: pytest + ruff
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --group dev

      - name: Lint (ruff)
        run: uv run ruff check src/ tests/

      - name: Format check (ruff)
        run: uv run ruff format --check src/ tests/

      - name: Run tests
        run: uv run pytest --tb=short -q

  windows-paths:
    name: windows path portability
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --group dev

      - name: Lint (ruff)
        run: uv run ruff check src/ tests/

      - name: Portability smoke
        run: uv run python scripts/portability_smoke.py

      - name: Windows path-focused tests
        run: >
          uv run pytest --tb=short -q
          tests/test_cross_os_portability_v17.py
          tests/test_compile_v2.py
          tests/test_phase1a_pack_export.py
          tests/test_indexer_extra.py
          tests/test_lint.py
          tests/test_lock.py
          tests/test_console_encoding.py
